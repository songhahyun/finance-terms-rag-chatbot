name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend Python Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.deploy.txt

      - name: Install deployment dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.deploy.txt

      - name: Import backend app
        run: python -c "import backend.app.main; print('backend import ok')"

      - name: Compile backend and source packages
        run: python -m compileall backend src

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-web
        run: npm ci

      - name: Build frontend
        working-directory: frontend-web
        run: npm run build

  docker:
    name: Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t finance-rag-backend:ci .

      - name: Verify image excludes Chroma artifacts
        run: |
          docker run --rm --entrypoint sh finance-rag-backend:ci -c '
            test ! -e /app/chroma_clova &&
            test ! -e /app/chroma_openai &&
            test ! -e /app/chroma_local
          '

      - name: Verify deployment dependency set
        run: |
          docker run --rm --entrypoint python finance-rag-backend:ci -c "
          import importlib.metadata as metadata
          excluded = {
              'sentence-transformers',
              'langchain-huggingface',
              'ragas',
              'bert-score',
              'datasets',
              'streamlit',
              'weave',
          }
          installed = {dist.metadata['Name'].lower() for dist in metadata.distributions()}
          present = sorted(excluded & installed)
          if present:
              raise SystemExit(f'Excluded packages installed: {present}')
          print('deployment dependency set ok')
          "

  publish-backend-image:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker
    if: github.event_name == 'push'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
