services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: .env.deploy
        required: false
    environment:
      GENERATION_PROVIDER: openai
      API_AUTH_REQUIRED: "true"
      CHROMA_CLIENT_MODE: http
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_SSL: "false"
    ports:
      - "8000:8000"
    depends_on:
      - chroma

  chroma:
    image: chromadb/chroma:latest
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
    volumes:
      - ./chroma_clova:/data
    expose:
      - "8000"

